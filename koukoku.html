<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --forest-deep: #1a2e1a;
    --forest-light: #3d6b3d;
    --gold: #c9a84c;
    --cream: #f7f5f0;
    --text-dark: #1a2312;
    --text-light: #6a7a6a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
  }

  /* NAV */
  nav {
    background: var(--forest-deep);
    padding: 0 48px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .logo-mark {
    width: 38px; height: 38px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: white;
  }
  .nav-back {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }
  .nav-back:hover { color: white; }

  /* HERO */
  .page-hero {
    background: var(--forest-deep);
    padding: 64px 48px;
    text-align: center;
    border-bottom: 1px solid rgba(201,168,76,0.3);
  }
  .page-hero-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .page-hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    font-weight: 300;
    color: white;
    margin-bottom: 12px;
  }
  .page-hero p {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
  }

  /* MAIN */
  .main-content {
    max-width: 900px;
    margin: 0 auto;
    padding: 80px 48px;
  }

  .notice-box {
    background: white;
    border: 1px solid rgba(61,107,61,0.15);
    border-radius: 4px;
    padding: 48px;
    margin-bottom: 32px;
  }
  .notice-box h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--forest-deep);
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }
  .notice-empty {
    text-align: center;
    padding: 48px 0;
    color: var(--text-light);
    font-size: 14px;
    line-height: 1.9;
    font-weight: 300;
  }
  .notice-empty p { margin-bottom: 8px; }

  .company-info {
    background: white;
    border: 1px solid rgba(61,107,61,0.15);
    border-radius: 4px;
    padding: 32px 48px;
  }
  .company-info h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-light);
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }
  .company-info table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .company-info td {
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    vertical-align: top;
  }
  .company-info td:first-child {
    color: var(--text-light);
    width: 160px;
    font-weight: 500;
    font-size: 13px;
  }

  /* FOOTER */
  footer {
    background: var(--forest-deep);
    padding: 32px 48px;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 12px;
  }
  footer a {
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    margin: 0 12px;
    transition: color 0.3s;
  }
  footer a:hover { color: rgba(255,255,255,0.8); }
  .footer-links { margin-bottom: 12px; }
</style>
</head>
